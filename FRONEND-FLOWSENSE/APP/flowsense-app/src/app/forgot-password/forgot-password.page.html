<div class="forgot-container">

  <div class="card">

    <h1>
      Recuperar Senha
    </h1>

    <p>
      Digite seu email para receber o link de recuperação.
    </p>

    <form [formGroup]="form">

      <input
        type="email"
        placeholder="Digite seu email"
        formControlName="email"
      />

      <div
        class="error"
        *ngIf="errorMessage">

        {{ errorMessage }}

      </div>

      <div
        class="success"
        *ngIf="successMessage">

        {{ successMessage }}

      </div>

      <button
        type="button"
        (click)="sendEmail()"
        [disabled]="loading">

        {{ loading ? 'Enviando...' : 'Enviar recuperação' }}

      </button>

      <button
        type="button"
        class="back-btn"
        (click)="back()">

        Voltar

      </button>

    </form>

  </div>

</div>
