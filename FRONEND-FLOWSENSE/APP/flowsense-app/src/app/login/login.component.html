<div class="login-container">
  <!-- Decorative Blobs -->
  <div class="blob blob-top-left"></div>
  <div class="blob blob-top"></div>
  <div class="blob blob-bottom-left"></div>
  
  <!-- Decorative Circles -->
  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>

  <!-- Main Content -->
  <div class="login-content">
    <div class="content-box">
      <h1 class="login-title">Bem Vindo!</h1>
      <br>


      <form [formGroup]="loginForm" class="login-form">
        <!-- Error Message -->
        <div *ngIf="errorMessage" class="error-banner">
          {{ errorMessage }}
        </div>

        <!-- Email -->
        <div class="form-group">
          <input
            type="email"
            class="form-input"
            placeholder="Email"
            formControlName="email"
            [disabled]="isLoading" />
          <div class="input-underline"></div>
          <span class="error-message" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
            Um email válido é obrigatório
          </span>
        </div>

        <!-- Password with Toggle -->
        <div class="form-group">
          <div class="password-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              class="form-input"
              placeholder="Senha"
              formControlName="password"
              [disabled]="isLoading" />
            <button
              type="button"
              class="password-toggle"
              (click)="togglePasswordVisibility()"
              [disabled]="isLoading">
              <svg *ngIf="!showPassword" class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg *ngIf="showPassword" class="eye-icon eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <div class="input-underline"></div>
          <span class="error-message" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            Senha tem que ter pelo menos 8 caracteres
          </span>
        </div>

        <!-- Forgot Password Link -->
        <button type="button" class="forgot-password-link" (click)="onForgotPassword()" [disabled]="isLoading">
          Esqueceu a senha?
        </button>

        <!-- Buttons -->
        <div class="buttons-container">
          <button
            type="button"
            class="btn btn-primary"
            (click)="onLogin()"
            [disabled]="loginForm.invalid || isLoading">
            {{ isLoading ? 'Entrando...' : 'Entrar' }}
          </button>
          <button
            type="button"
            class="btn btn-secondary"
            (click)="onSignup()"
            [disabled]="isLoading">
            Regitrar-se
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
